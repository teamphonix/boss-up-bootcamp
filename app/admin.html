<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boss Up Bootcamp Admin Control Room</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=admin-hidden-fix-20260610" />
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-hero">
      <a class="brand" href="/" aria-label="Back to Boss Up Bootcamp home">
        <span class="brand-mark brand-logo"><img src="./assets/generated/bu-logo-placeholder.jpg" alt="BU logo" /></span>
        <span><strong>Boss Up Control Room</strong><small>Registration · Calendar · Check-in</small></span>
      </a>
      <button class="button button-light admin-logout" id="admin-logout" type="button" hidden>Logout</button>
    </section>

    <section class="admin-login-card" id="admin-login-card">
      <p class="kicker">Private admin access</p>
      <h1>Control Room</h1>
      <p>Enter the admin password to view registrations, seat counts, check-ins, and calendar/event details.</p>
      <form class="admin-login-form" id="admin-login-form">
        <label>Admin password <input id="admin-password" type="password" autocomplete="current-password" required /></label>
        <button class="button button-dark" type="submit">Open Control Room</button>
      </form>
      <p class="form-note" id="admin-login-message" role="status"></p>
    </section>

    <section class="admin-dashboard" id="admin-dashboard" hidden>
      <div class="admin-section-heading">
        <div>
          <p class="kicker">Dashboard</p>
          <h1>Boss Up Bootcamp</h1>
        </div>
        <button class="button button-light" id="admin-sync-stripe" type="button">Sync Stripe</button>
        <button class="button button-light" id="admin-refresh" type="button">Refresh</button>
      </div>

      <div class="admin-stats" id="admin-stats" aria-label="Registration stats"></div>

      <article class="admin-panel" id="admin-event-panel">
        <div class="admin-panel-heading">
          <div>
            <p class="kicker">Calendar control</p>
            <h2>Current event</h2>
          </div>
        </div>
        <div id="admin-event-details" class="admin-event-details"></div>
      </article>

      <article class="admin-panel">
        <div class="admin-panel-heading">
          <div>
            <p class="kicker">Registrations</p>
            <h2>Attendees</h2>
          </div>
          <input class="admin-search" id="admin-search" type="search" placeholder="Search name, email, phone" />
        </div>
        <div class="admin-attendee-list" id="admin-attendee-list"></div>
      </article>
    </section>
  </main>
  <script src="./admin.js?v=stripe-sync-fix-20260610"></script>
</body>
</html>
